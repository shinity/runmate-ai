build:
  name: Preview Android APK (Monorepo)
  steps:
    - eas/checkout
    - run:
        name: Install dependencies
        command: cd ../.. && npm install --legacy-peer-deps
    - run:
        name: Build workspace packages
        command: cd ../../packages/types && npx tsc && cd ../validators && npx tsc
    - run:
        name: Expo Prebuild (Android)
        command: npx expo prebuild --platform android --non-interactive
    - run:
        name: Build Android Debug APK
        working_directory: android
        command: ./gradlew assembleDebug
