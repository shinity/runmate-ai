build:
  name: Preview Android APK (Monorepo)
  steps:
    - eas/checkout
    - run:
        name: Install dependencies
        working_directory: ../..
        command: npm install --legacy-peer-deps
    - run:
        name: Build @runmate/types
        working_directory: ../../packages/types
        command: npx tsc
    - run:
        name: Build @runmate/validators
        working_directory: ../../packages/validators
        command: npx tsc
    - run:
        name: Expo Prebuild (Android)
        command: npx expo prebuild --platform android --non-interactive
    - run:
        name: Build Android Debug APK
        working_directory: android
        command: ./gradlew assembleDebug
