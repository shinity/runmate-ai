name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/runmate-api

jobs:
  # ─── 1. 테스트 ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runmate
          POSTGRES_PASSWORD: runmate_dev
          POSTGRES_DB: runmate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build workspace packages
        run: |
          npm run build --workspace=packages/types
          npm run build --workspace=packages/validators

      - name: Generate Prisma Client
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://runmate:runmate_dev@localhost:5432/runmate
        run: npx prisma db push --skip-generate && npx prisma generate

      - name: Run tests
        working-directory: services/api
        env:
          DATABASE_URL: postgresql://runmate:runmate_dev@localhost:5432/runmate
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm test

  # ─── 2. Docker 이미지 빌드 & GHCR 푸시 ───────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old GHCR images (keep last 5)
        uses: actions/delete-package-versions@v5
        with:
          package-name: runmate-api
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: false
        continue-on-error: true

  # ─── 3. Synology 배포 ────────────────────────────────────────
  deploy:
    name: Deploy to Synology
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Copy config files to NAS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NAS_TAILSCALE_IP }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          source: "infrastructure/docker/docker-compose.prod.yml,infrastructure/docker/nginx.conf"
          target: ${{ secrets.NAS_PROJECT_PATH }}
          strip_components: 2

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_TAILSCALE_IP }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT }}
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin
            cd ${{ secrets.NAS_PROJECT_PATH }}

            # 현재 이미지를 previous로 저장 (롤백용)
            docker tag ghcr.io/${{ env.IMAGE_NAME }}:latest ghcr.io/${{ env.IMAGE_NAME }}:previous 2>/dev/null || true

            # GHCR 로그인
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # 새 이미지 pull
            docker compose -f docker-compose.prod.yml pull api

            # DB/Redis가 꺼져 있으면 시작 (이미 실행 중이면 no-op)
            docker compose -f docker-compose.prod.yml up -d postgres redis

            # postgres 헬스체크 대기 (최대 30초)
            for i in $(seq 1 6); do
              sleep 5
              PG_STATUS=$(docker inspect --format='{{.State.Health.Status}}' runmate-ai-postgres-1 2>/dev/null || echo "unknown")
              echo "postgres health=$PG_STATUS"
              if [ "$PG_STATUS" = "healthy" ]; then break; fi
            done

            # 배포
            docker compose -f docker-compose.prod.yml up -d --no-deps api nginx

            # 헬스체크 — nginx 대신 API 컨테이너 직접 체크 (60초, 5초 간격 12회)
            echo "Waiting for health check..."
            sleep 10
            HEALTHY=false
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' runmate-ai-api-1 2>/dev/null || echo "unknown")
              echo "Attempt $i/12: container health=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                break
              fi
              if [ "$STATUS" = "unhealthy" ]; then
                docker compose -f docker-compose.prod.yml logs api --tail 10
                break
              fi
            done

            if [ "$HEALTHY" = "true" ]; then
              echo "✅ 배포 완료: $(date)"
              # 사용하지 않는 이미지 정리 (태그 없는 이미지 + 7일 이상 된 이미지)
              docker image prune -f
              docker image prune -a --filter "until=168h" -f
              exit 0
            fi

            # 롤백
            echo "❌ 헬스체크 실패 - 롤백 중..."
            docker tag ghcr.io/${{ env.IMAGE_NAME }}:previous ghcr.io/${{ env.IMAGE_NAME }}:latest 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            echo "🔄 롤백 완료"
            exit 1
