services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-runmate}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runmate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    image: ghcr.io/${GHCR_OWNER}/runmate-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-runmate}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-runmate}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      AI_PIPELINE_URL: http://ai-pipeline:8000
      AI_PIPELINE_SECRET: ${AI_PIPELINE_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GOOGLE_WEB_CLIENT_ID: ${GOOGLE_WEB_CLIENT_ID:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-io.runmate.app}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/services/api/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ai-pipeline: GHCR 이미지 빌드 후 활성화
  # ai-pipeline:
  #   image: ghcr.io/${GHCR_OWNER}/runmate-ai-pipeline:latest
  #   restart: unless-stopped
  #   environment:
  #     AI_PIPELINE_SECRET: ${AI_PIPELINE_SECRET}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  #     PINECONE_API_KEY: ${PINECONE_API_KEY:-}
  #   volumes:
  #     - uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-runmate}
      POSTGRES_DB: ${POSTGRES_DB:-runmate}
    volumes:
      - db_backups:/backups
    entrypoint: >
      /bin/sh -c "
      while true; do
        FILENAME=/backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$FILENAME
        echo \"Backup: $$FILENAME\"
        find /backups -name '*.sql.gz' -mtime +7 -delete
        sleep 86400
      done"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  uploads:
  uptime_kuma_data:
  db_backups:
